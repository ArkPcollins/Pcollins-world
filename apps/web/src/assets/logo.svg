<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B3A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A373;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- P Logo Mark -->
  <rect x="0" y="5" width="50" height="50" rx="12" fill="url(#logoGrad)"/>
  <text x="25" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">P</text>
  <!-- Company Name -->
  <text x="62" y="38" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1A2A4F" letter-spacing="1">P Collins</text>
  <!-- Tagline -->
  <text x="62" y="52" font-family="Arial, sans-serif" font-size="10" fill="#8B3A3A" letter-spacing="2" font-weight="600">MARKETPLACE · SAVINGS · REAL ESTATE</text>
</svg>