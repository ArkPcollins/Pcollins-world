<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B3A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B2C2C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- P Icon with house/saving symbol -->
  <rect x="0" y="2" width="56" height="56" rx="14" fill="url(#iconGrad)"/>
  <!-- House roof -->
  <polygon points="28,8 48,22 8,22" fill="white" opacity="0.9"/>
  <!-- House body -->
  <rect x="16" y="22" width="24" height="20" fill="white" opacity="0.9"/>
  <!-- Door -->
  <rect x="23" y="28" width="10" height="14" fill="#8B3A3A"/>
  <!-- P letter -->
  <text x="28" y="52" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="white" text-anchor="middle">P</text>
  <!-- Company Name -->
  <text x="70" y="34" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1A2A4F">P Collins</text>
  <!-- Tagline -->
  <text x="70" y="50" font-family="Arial, sans-serif" font-size="10" fill="#D4A373" letter-spacing="3" font-weight="600">TRUST · GROWTH · EXCELLENCE</text>
</svg>